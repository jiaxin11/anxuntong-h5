<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 我的工地</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 我的工地</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const COLOR={red:'var(--major)',yellow:'var(--serious)',green:'var(--ok)'};
function spark(seed){ let s=seed*97; const bars=[]; for(let i=0;i<7;i++){ s=(s*1103515245+12345)&0x7fffffff; bars.push(20+Math.floor(s/0x7fffffff*80)); } return `<div class="spark">${bars.map(h=>`<i style="height:${h}%"></i>`).join('')}</div>`; }
const pins=SITES.map((s,i)=>`<div class="pin" style="left:${12+i*14}%;top:${30+(i%3)*22}%;background:${COLOR[s.lvl]}"></div>`).join('');
const rows=SITES.map(s=>`
  <div class="card" style="margin-bottom:10px" onclick="go('site-detail.html?id=${s.id}')">
    <div style="display:flex;align-items:center;gap:8px">
      <b style="font-size:14px;flex:1">${s.name}</b>
      <span class="lvl-pill ${s.lvl}">${s.lvl==='red'?'高危':s.lvl==='yellow'?'预警':'正常'}</span>
    </div>
    <div class="muted tiny" style="margin:5px 0 9px">📍 ${s.street} · ${s.ent}</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:var(--ink-2)"><span class="dot-on" style="background:${s.online===s.dev?'var(--ok)':'var(--serious)'}"></span>设备 ${s.online}/${s.dev} 在线</span>
      <div style="margin-left:auto;text-align:right"><div style="font-size:10px;color:var(--ink-3);margin-bottom:2px">近7日报警</div>${spark(s.id)}</div>
    </div>
  </div>`).join('');
const body=`
  <div class="card"><div class="sec-title" style="margin-top:0">工地分布<span class="tagline" style="margin-left:6px">我负责 ${SITES.length} 个</span></div>
    <div class="mapbox"><div class="gridl"></div>${pins}</div></div>
  ${rows}
`;
renderApp({title:'我的工地', back:true, body});
</script>
</body>
</html>
