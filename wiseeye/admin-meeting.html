<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 一会三卡</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 一会三卡</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const NOMEET=[['岗头·旧楼加固工程','坂田街道','连续 2 日未召开'],['南岭·外墙清洗作业','南湾街道','今日未召开']];
const REC=[['五和社区·沿街商铺装修','08:02','12 人签到 · 安全员到场','COMPLETE'],['甘坑·充电设施安装','07:58','8 人签到 · 安全员到场','COMPLETE'],['木棉湾·招牌安装','08:15','5 人签到 · 安全员缺席','INCOMPLETE']];
const STA={COMPLETE:['完整','var(--ok)'],INCOMPLETE:['不完整','var(--serious)']};
const noHTML=NOMEET.map(n=>`<div class="list-row"><div class="li">⚠️</div><div class="lt">${n[0]}<small>${n[1]} · ${n[2]}</small></div><button class="chip" style="padding:4px 10px;font-size:11px" onclick="toast('已下发督办通知')">督办</button></div>`).join('');
const recHTML=REC.map(r=>`<div class="list-row"><div class="li">📋</div><div class="lt">${r[0]}<small>${r[1]} · ${r[2]}</small></div><span class="lvl-pill" style="background:${STA[r[3]][1]}">${STA[r[3]][0]}</span></div>`).join('');
const body=`
  <div class="stat-grid c4" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-cell c-ok"><div class="v">86%</div><div class="l">执行率</div></div>
    <div class="stat-cell"><div class="v">${REC.length}</div><div class="l">今日已召开</div></div>
    <div class="stat-cell c-vio"><div class="v">${NOMEET.length}</div><div class="l">未召开</div></div></div>
  <div class="card"><div class="sec-title" style="margin-top:0">班前会执行率<span class="tagline" style="margin-left:6px">近 7 日</span></div>
    <div class="bars">
      <div class="bar-row"><div class="bl">周一</div><div class="bt"><i style="width:88%;background:var(--ok)"></i><span>88%</span></div></div>
      <div class="bar-row"><div class="bl">周二</div><div class="bt"><i style="width:82%;background:var(--ok)"></i><span>82%</span></div></div>
      <div class="bar-row"><div class="bl">周三</div><div class="bt"><i style="width:79%;background:var(--serious)"></i><span>79%</span></div></div>
      <div class="bar-row"><div class="bl">今日</div><div class="bt"><i style="width:86%;background:var(--ok)"></i><span>86%</span></div></div></div></div>
  <div class="card"><div class="sec-title" style="margin-top:0">⚠️ 未召开工地</div>${noHTML}</div>
  <div class="card" style="margin-bottom:0"><div class="sec-title" style="margin-top:0">今日执行记录</div>${recHTML}</div>
`;
renderApp({title:'一会三卡', back:true, body});
</script>
</body>
</html>
