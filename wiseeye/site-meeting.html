<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 班前会</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 班前会</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const KEY='we_meeting_v1';
const SITE='坂田街道 · 五和社区 · 沿街商铺装修工程';
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||null;}catch(e){return null;} }
function save(m){ localStorage.setItem(KEY, JSON.stringify(m)); }
const POOL=[['赵强','钢筋工'],['孙磊','架子工'],['周勇','电工'],['吴刚','木工'],['郑斌','普工']];

function render(){
  const m=load(); let body;
  if(!m){
    body=`
      <div class="principle"><span class="i">📋</span><span><b>班前会</b>：发起后生成签到二维码（1 小时有效），成员扫码并经 <b>GPS≤50m</b> 校验签到，PTZ 摄像头自动抓拍留证。</span></div>
      <div class="card">
        <div class="kv"><div class="k">工地</div><div class="v">${SITE}</div></div>
        <div class="kv"><div class="k">日期</div><div class="v">今日 ${new Date().toLocaleDateString('zh-CN')}</div></div>
        <div class="kv"><div class="k">主持人</div><div class="v">${currentUser()}</div></div>
        <div class="kv" style="border:0"><div class="k">留证</div><div class="v">PTZ 预置位抓拍 + GPS 签到</div></div>
      </div>
      <button class="btn btn-ok" onclick="start()">发起今日班前会</button>
      <button class="btn btn-line" style="margin-top:10px" onclick="toast('演示：历史班前会记录')">查看历史记录 ›</button>`;
  } else {
    const officer=m.signs.some(s=>s.role==='专职安全员');
    const rows=m.signs.map(s=>`<div class="sign-row"><div class="av">${s.role==='专职安全员'?'🦺':'👷'}</div><div class="sn">${s.name}<small>${s.role}</small></div><span class="gps">✓ GPS ${s.gps}m</span></div>`).join('');
    body=`
      <div class="demo-flag">📋 ${SITE} · 今日班前会进行中</div>
      <div class="card" style="text-align:center"><div class="qr-box">${qrSVG(m.code)}</div>
        <div style="font-size:13px;font-weight:600">扫码签到</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:4px">二维码 1 小时有效 · 需在工地 50m 范围内</div></div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="v">${m.signs.length}</div><div class="l">已签到</div></div>
        <div class="stat-cell"><div class="v" style="color:${officer?'var(--ok)':'var(--major)'}">${officer?'已到场':'未到场'}</div><div class="l">专职安全员</div></div></div>
      <div class="card"><div class="sec-title" style="margin-top:0">签到记录 <span class="tagline">GPS 校验通过</span></div>${rows}</div>
      <button class="btn btn-primary" onclick="add()">＋ 模拟新增一名签到</button>
      <button class="btn btn-ok" style="margin-top:10px" onclick="fin()">结束并归档班前会</button>`;
  }
  renderApp({title:'班前会', role:'site', tab:'meeting', body});
}
function start(){ save({code:'MEET-'+Date.now(), signs:[{name:currentUser(),role:'带班负责人',gps:8},{name:'李建国',role:'专职安全员',gps:15},{name:'陈伟',role:'班组长',gps:22}]}); toast('班前会已发起'); render(); }
function add(){ const m=load(); const p=POOL[m.signs.length%POOL.length]; m.signs.push({name:p[0],role:p[1],gps:10+Math.floor(Math.random()*38)}); save(m); toast('新增签到：'+p[0]); render(); }
function fin(){ localStorage.removeItem(KEY); toast('班前会已归档（记入一会三卡）'); setTimeout(render,500); }
render();
</script>
</body>
</html>
