<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 风险预警</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 风险预警</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const ranked=[...SITES].sort((a,b)=>b.risk-a.risk);
const rankHTML=ranked.map((s,i)=>`<div class="rank-row"><div class="rk ${i===0?'top':''}">${i+1}</div><div class="nm">${s.name}<small>${s.street} · ${s.ent}</small></div><span class="sc" style="color:${s.lvl==='red'?'var(--major)':s.lvl==='yellow'?'var(--serious)':'var(--ok)'}">${s.risk}</span><span class="lvl-pill ${s.lvl}">${s.lvl==='red'?'高危':s.lvl==='yellow'?'预警':'正常'}</span></div>`).join('');
const adv=AI_ADVICES.map(a=>`<div class="advice"><div class="at">⚠ ${a.t}<span class="u" style="background:${a.uc}">${a.u}</span></div><div class="ac">${a.c}</div></div>`).join('');
const body=`
  <div class="card">
    <div class="sec-title" style="margin-top:0">五维风险评分<span class="tagline" style="margin-left:6px">报警/严重度/整改/班前会/在线率</span></div>
    ${rankHTML}
  </div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">🤖 AI 政策建议<span class="tagline" style="margin-left:6px">Claude 生成</span></div>
    ${adv}
  </div>
  <button class="btn btn-primary" onclick="toast('演示：一键下发重点督办通知至对应街道')">下发重点督办通知</button>
  <button class="btn btn-line" style="margin-top:10px" onclick="go('admin-enterprise.html')">企业风险档案 ›</button>
`;
renderApp({title:'风险预警', role:'admin', tab:'risk', body});
</script>
</body>
</html>
