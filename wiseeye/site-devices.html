<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 工地设备</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 工地摄像头</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const DEV=[
  ['DH-IPC-门口枪机','SN:7K2J8801','出入口',true,true],
  ['HK-球机-3#楼东侧','SN:7K2J8842','主体结构',true,true],
  ['DH-IPC-料场','SN:7K2J8815','材料堆场',true,false],
  ['HK-球机-脚手架','SN:7K2J8867','外架作业面',true,true],
  ['DH-IPC-基坑','SN:7K2J8809','基坑临边',false,true],
  ['HK-枪机-门岗','SN:7K2J8853','门岗',true,false]
];
const pins=DEV.map((d,i)=>`<div class="pin" style="left:${15+i*12}%;top:${28+(i%3)*22}%;background:${d[3]?'var(--ok)':'var(--ink-3)'}"></div>`).join('');
const rows=DEV.map(d=>`
  <div class="list-row" onclick="go('camera.html?n=${encodeURIComponent(d[0])}')">
    <div class="li">📷</div><div class="lt">${d[0]}<small>${d[1]} · ${d[2]}${d[4]?' · PTZ云台':''}</small></div>
    <div class="lv"><span class="dot-on" style="background:${d[3]?'var(--ok)':'var(--ink-3)'}"></span>${d[3]?'在线':'离线'}</div><div class="chev">›</div></div>`).join('');
const on=DEV.filter(d=>d[3]).length;
const body=`
  <div class="card"><div class="sec-title" style="margin-top:0">点位分布</div><div class="mapbox"><div class="gridl"></div>${pins}</div></div>
  <div class="stat-grid"><div class="stat-cell"><div class="v">${DEV.length}</div><div class="l">摄像头</div></div><div class="stat-cell"><div class="v" style="color:${on===DEV.length?'var(--ok)':'var(--serious)'}">${on}/${DEV.length}</div><div class="l">在线</div></div></div>
  <div class="sec-title">设备列表</div>
  <div class="list-card">${rows}</div>
  <div class="principle" style="margin-top:4px"><span class="i">📡</span><span>设备离线超 2 小时将自动通知街道联系人；如长期离线请联系运维报修。</span></div>
`;
renderApp({title:'工地摄像头', back:true, body});
</script>
</body>
</html>
