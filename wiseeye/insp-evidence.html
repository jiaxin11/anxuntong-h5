<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · AI 证据链</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · AI 证据链</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const a=getAlarm(getParam('id'))||alarms[0]; const t=TYPES[a.type];
const body=`
  <div class="principle"><span class="i">🎬</span><span><b>AI 证据链</b>：报警截图 + 触发点前后 30 秒视频 + 时间戳 + 巡查员确认 + 电子签章，满足执法留证要求。</span></div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">违规视频片段 <span class="tagline">前后各 30s</span></div>
    <div class="vid">${sceneSVG()}<div class="bbox ${t.level}" style="left:${a.box.x}%;top:${a.box.y}%;width:${a.box.w}%;height:${a.box.h}%"></div>
      <div class="play" onclick="toast('演示：播放报警前后各 30 秒视频')">▶</div></div>
    <div class="vid-scrub"><i></i><span class="kf"></span></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3)"><span>-30s</span><span style="color:var(--major);font-weight:700">⚑ 触发点 ${a.time}</span><span>+30s</span></div>
  </div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">证据要素</div>
    <div class="evi-row"><div class="ic">🖼</div><div class="tx">AI 抓拍截图<small>${t.name} · 含 AI 标注框 · 置信度 ${a.conf}%</small></div><span class="ok">✓</span></div>
    <div class="evi-row"><div class="ic">🎞</div><div class="tx">前后 30 秒视频片段<small>神眸 media/vod 截取并回写 video_clip_url</small></div><span class="ok">✓</span></div>
    <div class="evi-row"><div class="ic">🕓</div><div class="tx">时间戳<small>报警时间 今日 ${a.time} · 设备时钟同步</small></div><span class="ok">✓</span></div>
    <div class="evi-row"><div class="ic">📷</div><div class="tx">点位设备<small>${a.dev} · SN:${a.sn} · ${a.site}</small></div><span class="ok">✓</span></div>
    <div class="evi-row"><div class="ic">✍</div><div class="tx">巡查员复核确认<small>${a.status==='PENDING'?'待确认（确认后生成电子签章）':currentUser()+' 已处理 · 电子签章已附'}</small></div><span class="ok">${a.status==='PENDING'?'…':'✓'}</span></div>
  </div>
  <button class="btn btn-primary" onclick="toast('演示：已生成《AI 证据包》PDF')">⬇ 生成并下载证据包（PDF）</button>
  <button class="btn btn-line" style="margin-top:10px" onclick="goBack()">‹ 返回</button>
`;
renderApp({title:'AI 证据链', back:true, body});
</script>
</body>
</html>
