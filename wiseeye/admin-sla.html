<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 巡查SLA</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 巡查管理 / SLA</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const RANK=[['王师傅','坂田街道',58,96],['李建国','南湾街道',43,92],['陈伟','布吉街道',37,88],['赵敏','龙城街道',29,99],['周强','横岗街道',24,84]];
const OVER=[['未佩戴安全帽','五和社区','超时 12 分钟','王师傅'],['危险区域闯入','丹竹头','超时 6 分钟','李建国']];
const rankHTML=RANK.map((r,i)=>`<div class="rank-row"><div class="rk ${i===0?'top':''}">${i+1}</div><div class="nm">${r[0]}<small>${r[1]}</small></div><div style="text-align:right"><div class="sc" style="color:var(--primary);font-size:14px">${r[2]} 起</div><div style="font-size:10px;color:var(--ink-3)">按时确认 ${r[3]}%</div></div></div>`).join('');
const overHTML=OVER.map(o=>`<div class="list-row"><div class="li">⏰</div><div class="lt">${o[0]}<small>${o[1]} · ${o[2]} · ${o[3]}</small></div><button class="chip" style="padding:4px 10px;font-size:11px" onclick="toast('已升级至科长并催办')">升级催办</button></div>`).join('');
const body=`
  <div class="stat-grid c4" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-cell c-ok"><div class="v">93%</div><div class="l">按时确认率</div></div>
    <div class="stat-cell c-ai"><div class="v">8.5′</div><div class="l">平均确认时长</div></div>
    <div class="stat-cell c-pend"><div class="v">${OVER.length}</div><div class="l">超时待处理</div></div></div>
  <div class="principle"><span class="i">⏱</span><span>SLA：一般报警 30 分钟、严重报警 10 分钟内确认；超时由 notify-service 自动升级至科长（参数见运营配置中心）。</span></div>
  <div class="card"><div class="sec-title" style="margin-top:0">巡查员工作量排行<span class="tagline" style="margin-left:6px">本月确认数</span></div>${rankHTML}</div>
  <div class="card" style="margin-bottom:0"><div class="sec-title" style="margin-top:0">⏰ 超时未确认升级</div>${overHTML}</div>
`;
renderApp({title:'巡查 SLA 看板', back:true, body});
</script>
</body>
</html>
