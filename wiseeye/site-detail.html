<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 工地详情</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 工地详情</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const s=SITES.find(x=>String(x.id)===String(getParam('id')))||SITES[0];
const LV={red:['高危','var(--major)'],yellow:['预警','var(--serious)'],green:['正常','var(--ok)']};
const recent=alarms.slice(0,3);
const dims=[['报警频次',s.risk>=80?88:s.risk>=60?64:40],['违规严重度',s.risk>=80?82:58],['整改及时率',s.risk>=80?52:78],['班前会执行',s.risk>=80?60:86],['设备在线率',Math.round(s.online/s.dev*100)]];
const dimHTML=dims.map(([l,v])=>`<div class="bar-row"><div class="bl">${l}</div><div class="bt"><i style="width:${v}%;background:${v>=70?'var(--ok)':v>=50?'var(--serious)':'var(--major)'}"></i></div><div class="vio-rate">${v}</div></div>`).join('');
const recHTML=recent.map(a=>{const t=TYPES[a.type];return `<div class="list-row" onclick="go('insp-detail.html?id=${a.id}')"><div class="li">${t.icon}</div><div class="lt">${t.name}<small>${a.dev} · ${a.time}</small></div><span class="status-pill ${a.status}">${ST[a.status]}</span></div>`;}).join('');
const body=`
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px"><b style="font-size:16px;flex:1">${s.name}</b><span class="lvl-pill ${s.lvl}">${LV[s.lvl][0]}</span></div>
    <div class="muted tiny" style="margin:6px 0 12px">📍 ${s.street} · ${s.ent}</div>
    <div class="stat-grid" style="margin-bottom:0">
      <div class="stat-cell"><div class="v" style="color:${LV[s.lvl][1]}">${s.risk}</div><div class="l">风险评分</div></div>
      <div class="stat-cell"><div class="v" style="color:${s.online===s.dev?'var(--ok)':'var(--serious)'}">${s.online}/${s.dev}</div><div class="l">设备在线</div></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin:-2px 2px 12px">
    <button class="btn btn-line" style="flex:1;padding:10px" onclick="go('camera.html?n=${encodeURIComponent(s.name)}')">📷 查看摄像头</button>
    <button class="btn btn-line" style="flex:1;padding:10px" onclick="toast('已下发督办通知至 ${s.street}')">📣 下发督办</button>
  </div>
  <div class="card"><div class="sec-title" style="margin-top:0">五维风险评分</div>${dimHTML}</div>
  <div class="card"><div class="sec-title" style="margin-top:0">班前会</div>
    <div class="kv"><div class="k">今日</div><div class="v">${s.lvl==='red'?'<span style="color:var(--major)">未召开</span>':'<span style="color:var(--ok)">已召开 · 安全员到场</span>'}</div></div>
    <div class="kv" style="border:0"><div class="k">近7日执行率</div><div class="v">${s.lvl==='red'?'57%':'86%'}</div></div></div>
  <div class="card" style="margin-bottom:0"><div class="sec-title" style="margin-top:0">近期报警</div>${recHTML}</div>
`;
renderApp({title:'工地详情', back:true, body});
</script>
</body>
</html>
