<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 摄像头实时画面</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.ptzpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:8px;justify-content:center;margin:6px auto 2px}
.ptzpad button{border:1px solid var(--line);background:#fff;border-radius:12px;font-size:18px;color:var(--primary);cursor:pointer}
.ptzpad button:active{background:var(--primary-soft)}
.ptzpad .c{background:var(--primary);color:#fff;border-color:var(--primary);font-size:13px;font-weight:700}
.livetag{position:absolute;top:8px;left:8px;background:rgba(210,54,44,.92);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:flex;align-items:center;gap:5px}
.livetag i{width:7px;height:7px;border-radius:50%;background:#fff;animation:bk 1.1s infinite}
.preset{display:flex;gap:8px;flex-wrap:wrap}
.preset button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;color:var(--ink-2);cursor:pointer}
.preset button:active{background:var(--primary);color:#fff;border-color:var(--primary)}
</style>
</head>
<body>
<div class="stage-label">慧眼建安 · 摄像头实时画面</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const name=decodeURIComponent(getParam('n')||'')||'DH-IPC-门口枪机';
const body=`
  <div class="detail-img">${sceneSVG()}
    <div class="livetag"><i></i>LIVE</div>
    <div class="meta-bar"><span class="liveflag">● 神眸直播</span><span>${name}</span><span style="margin-left:auto" id="cclock">09:41:00</span></div>
  </div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">云台控制 <span class="tagline" style="margin-left:6px">PTZ</span></div>
    <div class="ptzpad">
      <button onclick="ptz('左上')">↖</button><button onclick="ptz('上')">▲</button><button onclick="ptz('右上')">↗</button>
      <button onclick="ptz('左')">◀</button><button class="c" onclick="ptz('归位')">归位</button><button onclick="ptz('右')">▶</button>
      <button onclick="ptz('左下')">↙</button><button onclick="ptz('下')">▼</button><button onclick="ptz('右下')">↘</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-line" style="flex:1;padding:9px" onclick="zoom('放大')">🔍＋ 放大</button>
      <button class="btn btn-line" style="flex:1;padding:9px" onclick="zoom('缩小')">🔍－ 缩小</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">预置位</div>
    <div class="preset">
      <button onclick="preset('大门口')">大门口</button><button onclick="preset('作业面')">作业面</button>
      <button onclick="preset('基坑')">基坑</button><button onclick="preset('料场')">料场</button><button onclick="preset('班前会位')">班前会位</button>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-primary" style="flex:1" onclick="toast('已抓拍当前画面并存档')">📸 抓拍</button>
    <button class="btn btn-line" style="flex:1" onclick="toast('已开始录像（演示）')">⏺ 录像</button>
  </div>
`;
renderApp({title:'实时画面', back:true, body});
function ptz(d){ toast('云台转向：'+d); }
function zoom(d){ toast('镜头'+d); }
function preset(p){ toast('已转到预置位：'+p); }
function ck(){const d=new Date();const p=n=>String(n).padStart(2,'0');const el=document.getElementById('cclock');if(el)el.textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}
ck(); setInterval(ck,1000);
</script>
</body>
</html>
