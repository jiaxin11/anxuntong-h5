<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 报表中心</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 报表中心</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const LBL={day:'日报',week:'周报',month:'月报'};
const DS={
  day:{span:'今日',detect:268,vio:31,done:28,rate:90,closed:62,meeting:88,online:94},
  week:{span:'本周 06/16–06/22',detect:1842,vio:213,done:198,rate:93,closed:81,meeting:84,online:94},
  month:{span:'本月 2026-06',detect:7586,vio:868,done:803,rate:92,closed:88,meeting:86,online:93}
};
function render(p){
  const d=DS[p];
  const seg=`<div class="seg">${['day','week','month'].map(x=>`<button class="${x===p?'on':''}" onclick="render('${x}')">${{day:'日',week:'周',month:'月'}[x]}</button>`).join('')}</div>`;
  const bar=(l,v,c)=>`<div class="bar-row"><div class="bl">${l}</div><div class="bt"><i style="width:${v}%;background:${c}"></i><span>${v}%</span></div></div>`;
  const body=`${seg}
    <div class="demo-flag">📈 ${LBL[p]} · ${d.span}（演示数据）</div>
    <div class="stat-grid c4">
      <div class="stat-cell c-ai"><div class="v">${d.detect}</div><div class="l">AI检测</div></div>
      <div class="stat-cell c-vio"><div class="v">${d.vio}</div><div class="l">违规</div></div>
      <div class="stat-cell c-ok"><div class="v">${d.done}</div><div class="l">已确认</div></div>
      <div class="stat-cell c-pend"><div class="v">${d.rate}%</div><div class="l">确认率</div></div></div>
    <div class="card"><div class="sec-title" style="margin-top:0">关键指标完成度</div>
      <div class="bars">${bar('整改闭环率',d.closed,d.closed>=85?'var(--ok)':'var(--serious)')}${bar('班前会执行率',d.meeting,d.meeting>=85?'var(--ok)':'var(--serious)')}${bar('设备在线率',d.online,'var(--accent)')}</div></div>
    <div class="card"><div class="sec-title" style="margin-top:0">街道维度导出</div>
      <div class="list-row" style="border-bottom:1px solid var(--line)" onclick="exp('坂田街道')"><div class="li">🏢</div><div class="lt">坂田街道${LBL[p]}</div><div class="lv">28 工地</div><div class="chev">›</div></div>
      <div class="list-row" style="border-bottom:1px solid var(--line)" onclick="exp('布吉街道')"><div class="li">🏢</div><div class="lt">布吉街道${LBL[p]}</div><div class="lv">35 工地</div><div class="chev">›</div></div>
      <div class="list-row" onclick="exp('南湾街道')"><div class="li">🏢</div><div class="lt">南湾街道${LBL[p]}</div><div class="lv">22 工地</div><div class="chev">›</div></div></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-line" style="flex:1" onclick="exp('全区·Excel')">⬇ 导出 Excel</button>
      <button class="btn btn-primary" style="flex:1" onclick="exp('全区·PDF')">⬇ 导出 PDF</button></div>`;
  renderApp({title:'报表中心', role:'admin', tab:'report', body});
}
function exp(s){ toast('演示：已生成《'+s+'报表》文件'); }
render('day');
</script>
</body>
</html>
