<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>慧眼建安 · 复核确认</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">慧眼建安 · 复核确认</div>
<div id="app"></div>
<script src="assets/app.js"></script>
<script>
requireLogin();
const a=getAlarm(getParam('id'))||alarms[0];
const t=TYPES[a.type];
let level=t.level;
const LAW={
  20001:'《建筑施工安全检查标准》JGJ 59-2011 第3.11.3条：作业人员进入施工现场应正确佩戴安全帽。',
  20002:'《建设工程施工现场消防安全技术规范》GB 50720：易燃易爆区域严禁明火与吸烟。',
  20003:'《建筑施工现场环境与卫生标准》：进入现场应穿戴反光衣等防护用品。',
  13001:'《建筑施工安全技术统一规范》：危险区域应设警示并禁止无关人员进入。',
  10010:'《施工现场安全管理规定》：特种作业岗位不得擅自离岗脱岗。',
  11005:'《建筑施工高处作业安全技术规范》JGJ 80：严禁攀爬脚手架、井架等结构上下。'
};

function imgHTML(){ return `${sceneSVG()}
  <div class="bbox ${level}" style="left:${a.box.x}%;top:${a.box.y}%;width:${a.box.w}%;height:${a.box.h}%"></div>
  <div class="meta-bar"><span class="liveflag">● 相机抓拍</span><span>${a.dev}</span><span style="margin-left:auto">${a.time}</span></div>`; }

const body=`
  <div class="detail-img">${imgHTML()}</div>
  <div class="principle"><span class="i">⚖</span><span><b>AI 主导识别定级，以现场复核为准。</b>等级、时限可修改；确认后计入整改闭环，误报可标记（连续 3 次自动延长该点位冷却）。</span></div>
  <div class="card">
    <div class="sec-title" style="margin-top:0">🤖 AI 识别结论</div>
    <div class="kv"><div class="k">报警类型</div><div class="v">${t.name}（${a.type}）</div></div>
    <div class="kv"><div class="k">识别链路</div><div class="v"><span class="chain-tag">智能检测 → 大模型分析</span></div></div>
    <div class="kv"><div class="k">点位设备</div><div class="v">${a.dev} · SN:${a.sn}</div></div>
    <div class="kv"><div class="k">所属工地</div><div class="v">${a.street} · ${a.site}</div></div>
    <div class="kv"><div class="k">触发时间</div><div class="v">今日 ${a.time}</div></div>
    <div class="kv"><div class="k">AI置信度</div><div class="v">${a.conf}%</div></div>
  </div>
  <div style="display:flex;gap:8px;margin:-2px 2px 12px">
    <button class="btn btn-line" style="flex:1;padding:9px" onclick="go('insp-evidence.html?id=${a.id}')">🎬 AI 证据链</button>
    <button class="btn btn-line" style="flex:1;padding:9px" onclick="location.href='tel:13800138000'">📞 拨打负责人</button>
  </div>
  <div class="card">
    <div class="field"><label>隐患等级（影响整改时限，可修改）</label>
      <div class="lv-seg" id="lvSeg">
        <button data-lv="major" onclick="pick('major')">重大</button>
        <button data-lv="serious" onclick="pick('serious')">较大</button>
        <button data-lv="general" onclick="pick('general')">一般</button></div>
      <div class="deadline-note">⏱ 建议整改时限：<b id="dl" style="color:var(--ink)">5 天</b>（依等级匹配）</div></div>
    <div class="field"><label>引用法规依据</label><div class="law-box">${LAW[a.type]}</div></div>
    <div class="field" style="margin-bottom:0"><label>现场复核备注</label>
      <textarea class="area" id="note" placeholder="如：已电话告知项目负责人，要求立即整改…"></textarea></div>
  </div>
  <div class="detail-actions">
    <button class="btn btn-line" style="flex:.9" onclick="misjudge()">标记误报</button>
    <button class="btn btn-primary" style="flex:1.5" onclick="confirmIt()">✓ 确认违规属实</button>
  </div>
`;
renderApp({title:'隐患复核确认', back:true, body});
setLv(level);
function setLv(lv){ document.querySelectorAll('#lvSeg button').forEach(b=>{b.className=''; if(b.dataset.lv===lv)b.classList.add('sel-'+lv);}); document.getElementById('dl').textContent=DEADLINE[lv]+' 天'; }
function pick(lv){ level=lv; setLv(lv); toast('已调整为'+LVNAME[lv]+'隐患 · 时限 '+DEADLINE[lv]+' 天'); }
function confirmIt(){ a.status='CONFIRMED'; saveAlarms(alarms); toast('已确认违规，进入整改闭环'); setTimeout(()=>go('insp-alarms.html'),900); }
function misjudge(){ a.status='MISJUDGE'; saveAlarms(alarms); toast('已标记误报 · 连续 3 次将自动延长该点位冷却（误报闭环）'); setTimeout(()=>go('insp-alarms.html'),1300); }
</script>
</body>
</html>
