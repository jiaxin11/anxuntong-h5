<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>安巡通 · 登录</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">安巡通 H5 · 登录</div>
<div class="phone">
  <div class="notch"></div>
  <div class="login">
    <div class="lg-top">
      <div class="lg-logo">安</div>
      <h1>安巡通</h1>
      <div class="sub">AI 智能安全巡查系统<br><b>相机识别 → 报警 → 确认 → 闭环</b></div>
    </div>

    <div class="lg-form">
      <div class="lg-role">
        <button class="on" data-r="巡查员" onclick="pickRole(this)">👷 巡查员</button>
        <button data-r="管理层" onclick="pickRole(this)">📊 管理层</button>
        <button data-r="管理员" onclick="pickRole(this)">⚙ 管理员</button>
      </div>
      <div class="lg-field">
        <span class="ic">👤</span>
        <input id="acc" placeholder="账号 / 手机号" value="wangshifu">
      </div>
      <div class="lg-field">
        <span class="ic">🔒</span>
        <input id="pwd" type="password" placeholder="密码" value="123456">
        <span class="eye" onclick="toggleEye(this)">👁</span>
      </div>
      <button class="lg-btn" onclick="doLogin()">登 录</button>
      <div class="lg-row">
        <span onclick="alert('演示：验证码登录')">验证码登录</span>
        <span onclick="alert('演示：忘记密码请联系测试组织方')">忘记密码？</span>
      </div>
      <div class="lg-demo">
        🧪 <b>测试账号</b>：巡查员 wangshifu　管理层 zhangzhuren<br>
        密码现场发放（演示任意密码可进），点击「登录」即体验巡查员工作台。
      </div>
    </div>

    <div class="lg-foot">龙岗区住建局 · 专项测试版 · 2026-06<br>数据本地化部署 · 多租户隔离 · 演示数据</div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
let role='巡查员';
function pickRole(el){ role=el.dataset.r;
  document.querySelectorAll('.lg-role button').forEach(b=>b.classList.toggle('on',b===el)); }
function toggleEye(el){ const p=document.getElementById('pwd');
  p.type = p.type==='password'?'text':'password'; el.style.opacity = p.type==='text'?1:.7; }
function doLogin(){
  const acc=document.getElementById('acc').value.trim();
  if(!acc){ alert('请输入账号'); return; }
  localStorage.setItem('axt_user', role==='巡查员'?'王师傅':acc);
  localStorage.setItem('axt_role', role);
  if(role==='巡查员') location.href='home.html';
  else { alert('演示版聚焦巡查员端，管理层/管理员看板暂未接入，先以巡查员身份体验闭环。');
    localStorage.setItem('axt_user','王师傅'); localStorage.setItem('axt_role','巡查员'); location.href='home.html'; }
}
startClock();
</script>
</body>
</html>
