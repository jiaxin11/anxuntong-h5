<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>小快灵 · 报表中心</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">小快灵 H5 · 报表中心</div>
<div id="app"></div>

<script src="assets/app.js"></script>
<script>
requireLogin();

const LBL={day:'日报',week:'周报',month:'月报'};
const DS={
  day:  {span:'今日 '+new Date().toLocaleDateString('zh-CN'), detect:138, vio:10, done:7, rate:70, closed:62, meeting:88, online:95},
  week: {span:'本周 (06/16–06/22)', detect:842, vio:63, done:57, rate:90, closed:81, meeting:84, online:94},
  month:{span:'本月 (2026-06)', detect:3586, vio:268, done:243, rate:92, closed:88, meeting:86, online:93}
};

function render(period){
  const d=DS[period];
  const seg=`<div class="seg">${['day','week','month'].map(p=>`<button class="${p===period?'on':''}" onclick="render('${p}')">${{day:'日',week:'周',month:'月'}[p]}</button>`).join('')}</div>`;
  const bar=(label,val,color)=>`
    <div class="bar-row"><div class="bl">${label}</div>
      <div class="bt"><i style="width:${val}%;background:${color}"></i><span>${val}%</span></div></div>`;
  const body=`
    ${seg}
    <div class="demo-flag">📈 ${LBL[period]} · ${d.span}（演示数据）</div>
    <div class="stat-grid">
      <div class="stat-cell c-ai"><div class="v">${d.detect}</div><div class="l">AI检测</div></div>
      <div class="stat-cell c-vio"><div class="v">${d.vio}</div><div class="l">违规数</div></div>
      <div class="stat-cell c-ok"><div class="v">${d.done}</div><div class="l">已确认</div></div>
      <div class="stat-cell c-pend"><div class="v">${d.rate}%</div><div class="l">确认率</div></div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">关键指标完成度</div>
      <div class="bars">
        ${bar('整改闭环率', d.closed, d.closed>=85?'var(--ok)':'var(--serious)')}
        ${bar('班前会执行率', d.meeting, d.meeting>=85?'var(--ok)':'var(--serious)')}
        ${bar('设备在线率', d.online, 'var(--ai)')}
      </div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">街道维度导出</div>
      <div class="list-row" style="border-bottom:1px solid var(--line)" onclick="exp('坂田街道','Excel')"><div class="li">🏢</div><div class="lt">坂田街道${LBL[period]}</div><div class="lv">28 工地</div><div class="chev">›</div></div>
      <div class="list-row" style="border-bottom:1px solid var(--line)" onclick="exp('布吉街道','Excel')"><div class="li">🏢</div><div class="lt">布吉街道${LBL[period]}</div><div class="lv">35 工地</div><div class="chev">›</div></div>
      <div class="list-row" onclick="exp('南湾街道','Excel')"><div class="li">🏢</div><div class="lt">南湾街道${LBL[period]}</div><div class="lv">22 工地</div><div class="chev">›</div></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-line" style="flex:1" onclick="exp('全区','Excel')">⬇ 导出 Excel</button>
      <button class="btn btn-primary" style="flex:1" onclick="exp('全区','PDF')">⬇ 导出 PDF</button>
    </div>
  `;
  renderApp({title:'报表中心', tab:undefined, back:true, body});
}
function exp(scope,fmt){ toast('演示：已生成《'+scope+'报表》'+fmt+' 文件'); }

render('day');
</script>
</body>
</html>
