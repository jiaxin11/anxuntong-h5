name: Deploy H5 to Server

# 触发条件：
# 1. push 到 main 分支时自动部署（生产）
# 2. 也可在 Actions 页面手动触发（workflow_dispatch）
on:
  push:
    branches: [main]
  workflow_dispatch:

# 避免并发部署互相覆盖
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: rsync static files to server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install sshpass & known_hosts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync (password auth)
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
          DHOST: ${{ secrets.DEPLOY_HOST }}
          DUSER: ${{ secrets.DEPLOY_USER }}
          DPATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          trim(){ echo "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          HOST="$(trim "$DHOST")"; USER="$(trim "$DUSER")"; DEST="$(trim "$DPATH")"
          echo "部署目标: ${USER}@${HOST}:${DEST}/"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='CONVERSATION.md' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            -e "sshpass -e ssh -p 22 -o StrictHostKeyChecking=yes" \
            ./ "${USER}@${HOST}:${DEST}/"
