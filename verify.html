<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>安巡通 · 证件核验</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">安巡通 H5 · 证件核验</div>
<div id="app"></div>

<script src="assets/app.js"></script>
<script>
requireLogin();
let verified=false;

function render(){
  const body = `
    <div class="principle">
      <span class="i">🪪</span>
      <span><b>持证上岗核验。</b>拍摄特种作业操作证 → OCR 识别 → 一键官方接口核验真伪。<b>证件照不留存</b>，仅返回核验结果。</span>
    </div>
    <div class="ocr-frame ${verified?'':'scanning'}" id="ocrFrame">
      <div class="scanline"></div>
      <div class="card-mock">
        <div class="ct">🪪 特种作业操作证（演示）</div>
        <div class="cr"><span>姓名</span><span>${verified?'李建国':'识别中…'}</span></div>
        <div class="cr"><span>操作项目</span><span>${verified?'建筑电工 (T)':'…'}</span></div>
        <div class="cr"><span>证书编号</span><span>${verified?'T44030019xxxx':'…'}</span></div>
        <div class="cr"><span>有效期至</span><span>${verified?'2027-08':'…'}</span></div>
      </div>
    </div>
    ${verified ? `
      <div class="verify-result">
        <div class="vi">✓</div>
        <div class="vt"><b>核验通过 · 证件真实有效</b><span>已比对应急管理部官方库（演示），在有效期内</span></div>
      </div>
      <div class="card">
        <div class="sec-title" style="margin-top:0">📋 识别字段</div>
        <div class="kv"><div class="k">姓名</div><div class="v">李建国</div></div>
        <div class="kv"><div class="k">作业类别</div><div class="v">特种作业 · 建筑电工</div></div>
        <div class="kv"><div class="k">准操项目</div><div class="v">建筑电工作业 (T)</div></div>
        <div class="kv"><div class="k">发证机关</div><div class="v">深圳市住房和建设局（演示）</div></div>
        <div class="kv"><div class="k">有效期</div><div class="v">2024-08 至 2027-08</div></div>
      </div>
      <button class="btn btn-primary" onclick="reset()">📷 再核验一张</button>
    ` : `
      <button class="btn btn-primary" onclick="scan()" id="scanBtn">📷 拍摄 / 上传证件核验</button>
    `}
    <button class="btn btn-line" onclick="goBack()" style="margin-top:10px">‹ 返回</button>
  `;
  renderApp({title:'证件核验', back:true, body});
}
function scan(){
  const btn=document.getElementById('scanBtn');
  btn.disabled=true; btn.textContent='OCR 识别 + 官方核验中…';
  document.getElementById('ocrFrame').classList.add('scanning');
  setTimeout(()=>{ verified=true; render(); }, 2000);
}
function reset(){ verified=false; render(); }
render();
</script>
</body>
</html>
