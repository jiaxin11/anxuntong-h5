<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>小快灵 · 巡检统计</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="stage-label">小快灵 H5 · 巡检统计</div>
<div id="app"></div>

<script src="assets/app.js"></script>
<script>
requireLogin();

const PERIOD_LABEL = {day:'今日', week:'本周', month:'本月'};

/* ---------- 日：基于当前报警数据实时计算 ---------- */
function dayDS(){
  const active=alarms.filter(a=>a.status!=='rejected');
  const confirmed=alarms.filter(a=>a.status==='confirmed');
  const closed=alarms.filter(a=>a.status==='closed');
  const rejected=alarms.filter(a=>a.status==='rejected');
  const pending=alarms.filter(a=>a.status==='pending');
  const base={helmet:42, smoking:31, climb:18, edge:25};
  const vioBase={helmet:9, smoking:6, climb:4, edge:7};
  const vioNow={helmet:0,smoking:0,climb:0,edge:0};
  alarms.forEach(a=>{ if(a.status!=='rejected' && vioNow[a.type]!==undefined) vioNow[a.type]++; });
  const bars=['helmet','smoking','climb','edge'].map(k=>[TYPE[k].short, vioBase[k]+vioNow[k], base[k]]);
  const doneCnt=confirmed.length+closed.length;
  const pct=active.length?Math.round(doneCnt/active.length*100):0;
  const regionMap={'坂田街道 · 五和社区':6,'南湾街道 · 丹竹头社区':5,'布吉街道 · 甘坑社区':4,'坂田街道 · 岗头社区':3,'布吉街道 · 木棉湾社区':2};
  alarms.filter(a=>a.status==='confirmed'||a.status==='closed').forEach(a=>{
    const r=a.org.split(' · ').slice(0,2).join(' · '); regionMap[r]=(regionMap[r]||0)+1;
  });
  const regions=Object.entries(regionMap).sort((x,y)=>y[1]-x[1]).slice(0,5);
  return {detect:119+alarms.length, vio:alarms.length, done:doneCnt, pending:pending.length,
    bars, pct, confirmed:confirmed.length, closed:closed.length, rejected:rejected.length, regions};
}

/* ---------- 周 / 月：演示汇总数据 ---------- */
const STATIC = {
  week:{
    detect:842, vio:63, done:57, pending:6,
    bars:[['安全帽',58,286],['吸烟',39,214],['攀爬',22,128],['临边',41,172]],
    pct:90, confirmed:31, closed:26, rejected:5,
    regions:[['坂田街道 · 五和社区',38],['南湾街道 · 丹竹头社区',31],['布吉街道 · 甘坑社区',24],['坂田街道 · 岗头社区',19],['布吉街道 · 木棉湾社区',13]]
  },
  month:{
    detect:3586, vio:268, done:243, pending:25,
    bars:[['安全帽',242,1180],['吸烟',163,902],['攀爬',95,540],['临边',176,735]],
    pct:92, confirmed:128, closed:115, rejected:21,
    regions:[['坂田街道 · 五和社区',162],['南湾街道 · 丹竹头社区',134],['布吉街道 · 甘坑社区',101],['坂田街道 · 岗头社区',83],['布吉街道 · 木棉湾社区',57]]
  }
};

function getDS(period){ return period==='day' ? dayDS() : STATIC[period]; }

function rateColor(r){ return r<=15?'#1E8E50':r<=30?'#D9730D':'#C8362F'; }

function render(period){
  const d=getDS(period);
  const lbl=PERIOD_LABEL[period];

  const barsHTML = d.bars.map(([short,vio,det])=>{
    const rate=Math.round(vio/det*100);
    return `<div class="bar-row"><div class="bl">${short}</div>
      <div class="bt"><i style="width:${rate}%;background:${rateColor(rate)}"></i><span>${vio}/${det}</span></div>
      <div class="vio-rate" style="color:${rateColor(rate)}">${rate}%</div></div>`;
  }).join('');

  const regionHTML = d.regions.map(([name,v],i)=>{
    const p=name.split(' · ');
    return `<div class="region-row"><div class="rk ${i===0?'top':''}">${i+1}</div>
      <div class="rn">${p[1]||name}<small>${p[0]||''}</small></div>
      <div class="rv">${v}<small> 起</small></div></div>`;
  }).join('');

  const seg = `<div class="seg">
    ${['day','week','month'].map(p=>`<button class="${p===period?'on':''}" onclick="render('${p}')">${{day:'日',week:'周',month:'月'}[p]}</button>`).join('')}
  </div>`;

  const body = `
    ${seg}
    <div class="demo-flag">📊 ${lbl}相机 AI 巡检统计（演示数据）</div>
    <div class="stat-grid">
      <div class="stat-cell c-ai"><div class="v">${d.detect}</div><div class="l">AI检测总数</div></div>
      <div class="stat-cell c-vio"><div class="v">${d.vio}</div><div class="l">AI违规数</div></div>
      <div class="stat-cell c-ok"><div class="v">${d.done}</div><div class="l">已确认</div></div>
      <div class="stat-cell c-pend"><div class="v">${d.pending}</div><div class="l">待确认</div></div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">各 AI 类型违规率<span class="tagline" style="margin-left:6px">检测→违规</span></div>
      <div class="bars">${barsHTML}</div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">${lbl}确认闭环情况</div>
      <div class="donut-wrap">
        <svg class="donut" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#EBEFF1" stroke-width="4"/>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--ok)" stroke-width="4"
            stroke-dasharray="${d.pct} ${100-d.pct}" stroke-linecap="round" transform="rotate(-90 18 18)"/>
          <text x="18" y="17" text-anchor="middle" font-size="7" font-weight="800" fill="#1C2733">${d.pct}%</text>
          <text x="18" y="24" text-anchor="middle" font-size="3.4" fill="#5C6B7A">确认率</text>
        </svg>
        <div class="legend">
          <div class="lg"><span class="sw" style="background:var(--ok)"></span>已确认<span class="ct">${d.confirmed}</span></div>
          <div class="lg"><span class="sw" style="background:var(--info)"></span>已闭环<span class="ct">${d.closed}</span></div>
          <div class="lg"><span class="sw" style="background:var(--ink-3)"></span>已驳回<span class="ct">${d.rejected}</span></div>
          <div class="lg"><span class="sw" style="background:#EBEFF1"></span>待确认<span class="ct">${d.pending}</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">区域违规 TopN<span class="tagline" style="margin-left:6px">按确认违规数</span></div>
      ${regionHTML}
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="sec-title" style="margin-top:0">闭环时限规则</div>
      <div class="muted tiny" style="line-height:1.9">
        重大隐患 <b style="color:var(--major)">2 天</b> 内整改 · 较大 <b style="color:var(--serious)">5 天</b> · 一般 <b style="color:var(--general)">10 天</b><br>
        通知书送达后进入「督办 → 整改上报 → 复查 → 闭环归档」流程。
      </div>
    </div>
  `;

  renderApp({title:'巡检统计', tab:'stats', body});
}

render('day');
</script>
</body>
</html>
